<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="talk.css" />
    <title>일단애니를보죠</title>
  </head>
  <body>
    <h1>일단애니를보죠</h1>
    <hr />

    <div>
      <aside>
        <a href="home.html"><button>홈</button></a>
        <a href="qna.html"><button>질문 게시판</button></a>
        <button>토론</button>
        <a href="mypage.html"><button>마이페이지</button></a>
      </aside>
      <main class="talk-content">
        <section class="room-panel">
          <div class="section-heading">
            <div>
              <h2>토론</h2>
            </div>
            <button id="create-room-button" type="button">방 만들기</button>
          </div>
          <form id="create-room-form" class="create-room-form" hidden>
            <input
              id="room-name-input"
              type="text"
              maxlength="40"
              placeholder="토론 주제"
              required
            />
            <button type="submit" id="creat">생성</button>
          </form>
          <p id="room-status" class="status" aria-live="polite"></p>
          <div id="room-list" class="room-list" aria-live="polite"></div>
        </section>

        <section class="chat-panel" aria-label="채팅">
          <div class="chat-heading">
            <div>
              <p class="eyebrow"></p>
              <h2 id="current-room-name">진행할 토론을 선택해주세요</h2>
            </div>
            <span id="connection-status" class="connection-status"
              >연결 안 됨</span
            >
          </div>
          <div id="chat-messages" class="chat-messages">
            <p class="chat-placeholder">
              왼쪽 목록에서 채팅방을 선택하면 대화가 시작됩니다.
            </p>
          </div>
          <form id="chat-form" class="chat-form">
            <input
              id="message-input"
              type="text"
              maxlength="500"
              placeholder="메시지를 입력해주세요"
              disabled
              required
            />
            <button type="submit" disabled>전송</button>
          </form>
        </section>
      </main>
    </div>
    <script src="talk.js" defer></script>
  </body>
</html>
